<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="css/style_gerenciador.css">
  <script src="js/script.js" defer></script>
</head>
<body>

  <header>
    <h1>Gerenciador de Tarefas</h1>
  </header>

  <!-- Contadores -->
  <div class="counters-container">
    <div class="counter-card baixa">
      <h3>Prioridade Baixa</h3>
      <span id="count-baixa">0</span>
    </div>
    <div class="counter-card media">
      <h3>Prioridade Média</h3>
      <span id="count-media">0</span>
    </div>
    <div class="counter-card alta">
      <h3>Prioridade Alta</h3>
      <span id="count-alta">0</span>
    </div>
  </div>

  <!-- Formulário -->
  <div class="form-container">
    <h2>Cadastrar Nova Tarefa</h2>
    <form id="taskForm">
      <label>Tarefa:</label>
      <input type="text" id="titulo" required>

      <label>Responsável:</label>
      <input type="text" id="responsavel" required>

      <label>Prioridade:</label>
      <select id="prioridade" required>
        <option value="Baixa">Baixa</option>
        <option value="Média">Média</option>
        <option value="Alta">Alta</option>
      </select>

      <label>Data de Realização:</label>
      <input type="date" id="data" required>

      <label>Descrição da Tarefa:</label>
      <textarea id="descricao" required></textarea>

      <button type="submit">Adicionar Tarefa</button>
    </form>
  </div>

  <!-- Colunas -->
  <div class="board-container">
    <div class="column">
      <h2>Aberto</h2>
      <div id="list-aberto"></div>
    </div>
    <div class="column">
      <h2>Em Andamento</h2>
      <div id="list-andamento"></div>
    </div>
    <div class="column">
      <h2>Finalizada</h2>
      <div id="list-finalizada"></div>
    </div>
  </div>

</body>
</html>
